<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>404 — ichilole</title>
<meta name="description" content="ページが見つかりませんでした / Page not found — ichilole">
<!-- ============================================================
  OGP（SNSシェア時のカード表示）
============================================================ -->
<meta property="og:type"        content="website">
<meta property="og:title"       content="Page Not Found — ichilole / studio mizumochi">
<meta property="og:description" content="お探しのページは見つかりませんでした">
<meta property="og:url"         content="https://ichilole.com/">
<meta property="og:image"       content="https://ichilole.com/images/og.webp">
<meta property="og:image:type"  content="image/webp">
<meta name="twitter:card"       content="summary_large_image">
<link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">
<link rel="manifest" href="/images/favicon/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* iOS Safari が横画面で本文を自動拡大する挙動を無効化（100%固定）*/
html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg2); color: var(--brown);
  min-height: 100vh; line-height: 1.7;
  display: flex; flex-direction: column;
}

/* ナビ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 110;
  background: var(--brown); height: 56px; padding: 0 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--bg3);
}
.nav-center { display: flex; gap: 2rem; }
.nav-center a {
  font-family: 'Outfit', sans-serif; font-size: 0.90rem; font-weight: 600;
  letter-spacing: 0.04em; text-decoration: none; color: var(--bg);
  padding-bottom: 0px; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.nav-center a:hover { color: var(--main); }

@media (max-width: 640px) {
  nav { padding: 0 1.25rem; }
  .nav-center { gap: 1.1rem; }
}
/* 極小幅（〜380px）：ナビが収まるよう少しだけ縮める */
@media (max-width: 380px) {
  nav { padding: 0 0.9rem; }
  .nav-center { gap: 0.8rem; }
  .nav-center a { font-size: 0.85rem; }
}

/* メインコンテンツ */
main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 5rem 2rem 3rem;
}
.container { text-align: center; max-width: 480px; }

.num {
  font-family: 'Outfit', sans-serif; font-size: 7rem; font-weight: 700;
  line-height: 1; letter-spacing: -0.04em;
  color: var(--bg3); margin-bottom: 1.5rem;
  user-select: none;
}

.title-ja {
  font-size: 1.05rem; font-weight: 700; color: var(--brown);
  margin-bottom: 0.3rem;
}
.title-en {
  font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600;
  color: var(--brown2); letter-spacing: 0.06em;
  margin-bottom: 1.4rem;
}
.desc {
  font-size: 0.84rem; color: var(--brown2);
  line-height: 1.85; margin-bottom: 0.4rem;
}

.btn {
  display: inline-block; margin-top: 2rem;
  padding: 0.75rem 2rem;
  background: var(--main); color: var(--bg);
  border-radius: 7px;
  font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 0.08em; text-decoration: none;
  transition: background 0.15s, transform 0.1s;
}
.btn:hover { background: var(--main-d); transform: translateY(-1px); }

footer {
  text-align: center; padding: 1.5rem;
  background: var(--brown);
  border-top: 1px solid var(--bg3);
  font-family: 'Outfit', sans-serif;
  font-size: 0.67rem; letter-spacing: 0.08em; color: var(--bg2);
}
</style>
</head>
<body>

<nav>
  <div class="nav-center">
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/policy/">Policy</a>
  </div>
</nav>


<main>
  <div class="container">
    <div class="num">404</div>

    <div class="title-ja">ページが見つかりませんでした</div>
    <div class="title-en">Page Not Found</div>

    <p class="desc">
      お探しのページは存在しないか、移動した可能性があります。<br>
      The page you're looking for doesn't exist or has been moved.
    </p>

    <a class="btn" href="/">← ポートフォリオに戻る &nbsp;/&nbsp; Back to Portfolio</a>
  </div>
</main>

<footer>© <span id="year"></span> ichilole / スタジオ水餅 — All rights reserved.</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
